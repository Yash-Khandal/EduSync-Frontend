trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: frontend-staticapp-token

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm install
    npm run build
  displayName: 'Build React App'

- task: AzureStaticWebApp@0
  displayName: 'Deploy to Azure Static Web App'
  inputs:
    app_location: '/'                 # Change if your React app is in a subfolder
    output_location: 'build'          # 'build' is default for Create React App
    azure_static_web_apps_api_token: $(deployment_token)
